<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>noteserver</title>
    <style>
      body { font-family: monospace; padding: 2rem; background: #0f0f0f; color: #e0e0e0; }
      h1 { color: #7ee787; }
      a { color: #79c0ff; }
    </style>
  </head>
  <body>
    <h1>Noteserver is running</h1>
    <ul>
      <li><a href="/health">GET /health</a></li>
      <li><a href="/api/info">GET /api/info</a></li>
      <li>POST /api/echo — send a JSON body</li>
      
      <!-- Tasks API -->
      <li><a href="/api/tasks">GET /api/tasks</a></li>
      <li>GET /api/tasks/:id</li>
      <li>POST /api/tasks - send a JSON body</li>
      <li>PUT /api/tasks/:id</li>
      <li>DELETE /api/tasks/:id</li>
    </ul>
  </body>
</html>
